<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quốc Toàn | Creative Frontend</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="hero">
    <div class="hero__content">
      <h1 class="hero__title">Bùi Quốc Toàn</h1>
      <p class="hero__tagline">Frontend Explorer</p>
    </div>
  </header>

  <main>

    <section class="about">
      <h2>About Me</h2>
      <div class="about__cards">
        <article class="card">Creative Thinker</article>
        <article class="card">Problem Solver</article>
        <article class="card">UI Builder</article>
      </div>
    </section>

    <section class="skills">
      <h2>Skill Galaxy</h2>
      <div class="skills__container">
        <div class="skill">HTML</div>
        <div class="skill">CSS</div>
        <div class="skill">Git</div>
        <div class="skill">JavaScript</div>
      </div>
    </section>

    <section class="projects">
      <h2>Projects</h2>
      <div class="projects__grid">
        <article class="project project--big">Project 1</article>
        <article class="project">Project 2</article>
        <article class="project">Project 3</article>
        <article class="project project--wide">Project 4</article>
      </div>
    </section>

  </main>

  <footer>
    <p>© 2026 Quốc Toàn</p>
  </footer>

</body>
</html>
