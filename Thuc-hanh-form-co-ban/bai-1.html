<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ĐĂNG KÝ THAM GIA CLB</title>
</head>
<body>
     <h2>ĐĂNG KÝ THAM GIA CLB</h2>

    <form>

        <label for="name">Họ và tên:</label><br>
        <input type="text" id="name" name="name"><br><br>

        <label for="email">Email:</label><br>
        <input type="email" id="email" name="email"><br><br>

        <label for="password">Mật khẩu:</label><br>
        <input type="password" id="password" name="password"><br><br>

        <label for="age">Tuổi:</label><br>
        <input type="number" id="age" name="age"><br><br>

        <p>Giới tính:</p>
        <input type="radio" id="male" name="gender">
        <label for="male">Nam</label>

        <input type="radio" id="female" name="gender">
        <label for="female">Nữ</label>

        <br><br>

        <p>Kỹ năng:</p>
        <input type="checkbox" id="html" name="skill">
        <label for="html">HTML</label>

        <input type="checkbox" id="css" name="skill">
        <label for="css">CSS</label>

        <br><br>

        <label for="club">Chọn ban:</label><br>
        <select id="club" name="club">
            <option>Kỹ thuật</option>
            <option>Truyền thông</option>
            <option>Sự kiện</option>
        </select>

        <br><br>

        <label for="intro">Giới thiệu:</label><br>
        <textarea id="intro" name="intro" rows="3" cols="30"></textarea>

        <br><br>

        <button type="submit">Đăng ký</button>
        <button type="reset">Làm lại</button>

    </form>

</body>
</html>
