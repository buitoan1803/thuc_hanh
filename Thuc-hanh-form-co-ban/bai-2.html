<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đặt Pizza Online</title>
</head>
<body>
    <h1>Đặt Pizza Online</h1>
    
    <form >
        <div>
            <label for="name">Họ và tên:</label> <br>
            <input type="text" id="name" name="name"><br>

            <label for="phone">Số điện thoại</label> <br>
            <input type="number" id="phone" name="phone"> <br>

            <label for="email">Email</label> <br>
            <input type="email" id="email" name="email">
        </div>
<br><br>
        <div>
            <h3>Size Pizza:</h3>
            <input type="radio" id="sizeS" name="size">
            <label for="sizeS">Size S</label> 

            <input type="radio" name="size" id="sizeM ">
            <label for="sizeM">Size M</label>

            <input type="radio" name="size" id="sizeL">
            <label for="sizeL">Size L</label>

        </div>


        <div>
            <h3>Thêm topping:</h3>
            <input type="checkbox" name="topping" id="pho_mai">
            <label for="pho_mai">Phô mai thêm</label> <br>

            <input type="checkbox" name="topping" id="xucxich">
            <label for="xucxich">Xúc xích</label> <br>

            <input type="checkbox" name="topping" id="nam">
            <label for="nam">Nấm</label> <br>

            <input type="checkbox" name="topping" id="hai_san">
            <label for="hai_san">Hải sản</label>
            <br><br>

            <label for="chon_de">Chọn loại đế bánh:</label><br>
            <select name="chon_de" id="de">
                    <option>Đế mỏng</option>
                    <option>Đế dày</option>
                    <option>Đế phô mai</option>
            </select>
            <br> <br>
              <label for="note">Ghi chú:</label><br>
            <textarea name="note" id="note" rows="5" cols="60"></textarea>
        </div>
      <br>
        <div>
          <button id="oder" type="submit">Đặt hàng</button>
          <button id="reset" type="reset">Làm lại</button>
        </div>
    </form>
</body>
</html>
